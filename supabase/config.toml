# Supabase local config — proyecto remoto msgfcxnqujgvkxrzkbsw
project_id = "msgfcxnqujgvkxrzkbsw"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[auth]
enabled = true

# Rate limiting nativo Auth: máx. 5 intentos login/registro por IP cada 5 min
# (Supabase agrupa por ventana de 5 min; en producción replicar en Dashboard → Auth → Rate Limits)
[auth.rate_limit]
sign_in_sign_ups = 5

[functions.verify-captcha]
verify_jwt = false
